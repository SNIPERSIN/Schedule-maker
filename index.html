<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<title>Live Schedule Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Playfair+Display:wght@700;900&family=Bebas+Neue&family=Pacifico&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #ff69b4;
  --bg: #1a0a1e;
  --sidebar-bg: #120818;
  --sidebar-border: #3d1a4a;
  --input-bg: #220d2e;
  --input-border: #5a2070;
  --block-bg: #1e0d28;
}
body { font-family: 'Poppins', Arial, sans-serif; background: var(--bg); color: #fff; min-height: 100vh; }

/* ── Layout ── */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 400px; min-width: 360px; background: var(--sidebar-bg); padding: 20px; overflow-y: auto; border-right: 2px solid var(--sidebar-border); display: flex; flex-direction: column; gap: 0; }
.preview-pane { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 30px 20px; background: #0e0e14; overflow-y: auto; }

/* ── Templates bar ── */
.templates-bar { background: #0a0012; border-bottom: 2px solid var(--sidebar-border); padding: 12px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; width: 400px; min-width: 360px; }
.templates-bar-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
.template-chip { background: #1e0d28; border: 1px solid #3d1a4a; border-radius: 20px; padding: 5px 12px; font-size: 12px; color: #ccc; cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; transition: all 0.15s; }
.template-chip:hover { border-color: var(--accent); color: #fff; }
.template-chip.active { border-color: var(--accent); background: rgba(255,105,180,0.15); color: #fff; }
.template-chip .del { color: #666; font-size: 10px; padding: 1px 3px; border-radius: 3px; }
.template-chip .del:hover { color: #ff4466; background: rgba(255,50,80,0.2); }
.btn-new-template { background: none; border: 1px dashed #444; color: #888; cursor: pointer; border-radius: 20px; padding: 5px 12px; font-size: 12px; white-space: nowrap; }
.btn-new-template:hover { border-color: var(--accent); color: var(--accent); }

/* ── Sidebar sections ── */
.section { margin-bottom: 0; }
.section-title {
  font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px;
  margin: 16px 0 8px; padding-top: 14px; border-top: 1px solid var(--sidebar-border);
  display: flex; align-items: center; gap: 6px;
}
.section-title:first-child { border-top: none; padding-top: 0; margin-top: 0; }

label.fl { display: block; font-size: 11px; color: #a080b0; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; font-weight: 600; }
input[type=text], input[type=time], textarea {
  width: 100%; padding: 8px 10px; background: var(--input-bg); border: 1px solid var(--input-border);
  color: #fff; border-radius: 8px; font-size: 13px; font-family: 'Poppins', Arial, sans-serif; margin-bottom: 10px;
}
input[type=time] { width: auto; margin-bottom: 0; }
textarea { resize: vertical; min-height: 50px; }
input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(255,105,180,0.15); }

/* ── Logo upload ── */
.logo-upload-area {
  border: 2px dashed var(--input-border); border-radius: 10px; padding: 12px;
  text-align: center; cursor: pointer; margin-bottom: 10px; transition: all 0.15s;
  position: relative; min-height: 70px; display: flex; align-items: center; justify-content: center;
}
.logo-upload-area:hover { border-color: var(--accent); }
.logo-upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.logo-upload-area .placeholder { font-size: 12px; color: #7a5a8a; pointer-events: none; }
.logo-preview { max-height: 50px; max-width: 150px; object-fit: contain; pointer-events: none; }
.btn-clear-logo { font-size: 10px; color: #ff6699; background: none; border: none; cursor: pointer; margin-top: 4px; display: block; }

/* ── Theme presets ── */
.theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
.theme-btn {
  border-radius: 10px; padding: 8px 6px; cursor: pointer; border: 2px solid transparent;
  font-size: 11px; font-weight: 700; text-align: center; color: #fff; transition: all 0.15s;
  font-family: 'Poppins', Arial, sans-serif;
}
.theme-btn:hover { transform: scale(1.04); }
.theme-btn.selected { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.4); }

/* ── Font presets ── */
.font-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
.font-btn {
  border-radius: 8px; padding: 10px 6px; cursor: pointer; border: 2px solid var(--input-border);
  font-size: 14px; text-align: center; color: #fff; background: var(--input-bg); transition: all 0.15s;
}
.font-btn:hover { border-color: var(--accent); }
.font-btn.selected { border-color: var(--accent); background: rgba(255,105,180,0.1); }

/* ── Day blocks ── */
.day-block { background: var(--block-bg); border-radius: 10px; padding: 10px; margin-bottom: 8px; border: 1px solid var(--sidebar-border); }
.day-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.day-header input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
.day-header span { font-size: 13px; font-weight: 700; }
.day-header span.off { color: #444; }
.day-header span.on { color: #fff; }
.stream-row { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; flex-wrap: wrap; }
.stream-row input[type=text] { flex: 1; min-width: 90px; margin-bottom: 0; font-size: 12px; padding: 5px 7px; }
.stream-row input[type=time] { padding: 5px 7px; font-size: 12px; }
.stream-row .sep { color: #888; font-size: 11px; }
.btn-rm { background: #2a0a3a; border: none; color: #9060a0; cursor: pointer; border-radius: 5px; padding: 4px 7px; font-size: 11px; }
.btn-rm:hover { background: #5a0060; color: #ff69b4; }
.btn-add-stream { background: none; border: 1px dashed var(--input-border); color: #7a5a8a; cursor: pointer; border-radius: 6px; padding: 4px 10px; font-size: 11px; width: 100%; margin-top: 2px; }
.btn-add-stream:hover { border-color: var(--accent); color: var(--accent); }

/* ── Bottom buttons ── */
.btn-save { width: 100%; padding: 11px; background: var(--input-bg); border: 1px solid var(--accent); color: var(--accent); border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; margin-top: 16px; }
.btn-save:hover { background: rgba(255,105,180,0.15); }
.btn-download { width: 100%; padding: 11px; background: linear-gradient(135deg, var(--accent), #a00060); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; margin-top: 8px; box-shadow: 0 4px 20px rgba(255,105,180,0.3); }
.btn-download:hover { opacity: 0.9; }

/* ── Preview ── */
.preview-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }

/* ── Schedule Card ── iPhone Story 9:16 (1080×1920) ── */
#schedule-card {
  width: 405px;
  height: 720px;
  border-radius: 30px;
  padding: 40px 28px 32px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; position: relative; z-index: 1; flex-shrink: 0; }
.card-logo { max-height: 60px; max-width: 140px; object-fit: contain; }
.card-logo-badge { border-radius: 12px; padding: 6px 11px; display: flex; flex-direction: column; align-items: center; line-height: 1; }
.card-logo-badge .lb-top { font-size: 10px; color: #fff; letter-spacing: 1px; font-weight: 900; }
.card-logo-badge .lb-mid { font-size: 17px; color: #fff; font-weight: 900; letter-spacing: 1px; }
.card-logo-badge .lb-bot { background: #fff; font-size: 8px; font-weight: 900; border-radius: 3px; padding: 1.5px 5px; letter-spacing: 1px; margin-top: 2px; }

.card-accent-deco { display: flex; gap: 6px; align-items: center; }
.card-deco-item { font-size: 20px; }

.card-brand { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.7); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; position: relative; z-index: 1; flex-shrink: 0; }
.card-title { font-size: 36px; font-weight: 900; color: #fff; text-transform: uppercase; line-height: 1; letter-spacing: 1.5px; position: relative; z-index: 1; flex-shrink: 0; }
.card-subtitle-date { font-size: 23px; font-weight: 700; margin-bottom: 20px; position: relative; z-index: 1; flex-shrink: 0; }

.days-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; position: relative; z-index: 1; flex-shrink: 0; }
.days-grid-bottom { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-top: 9px; position: relative; z-index: 1; flex-shrink: 0; }

.day-card { border-radius: 15px; padding: 11px 8px; display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
.day-card .dc-day { font-size: 13px; font-weight: 900; color: #fff; margin-bottom: 3px; line-height: 1; }
.day-card .dc-sname { font-size: 9px; font-weight: 700; line-height: 1.15; }
.day-card .dc-stime { font-size: 8.5px; line-height: 1.15; margin-bottom: 3px; opacity: 0.9; }
.day-card .dc-main { font-size: 10.5px; font-weight: 900; color: #fff; line-height: 1.1; margin-top: 2px; }
.day-card .dc-mtime { font-size: 9px; line-height: 1.15; opacity: 0.9; }
.day-card .dc-off { font-size: 9.5px; opacity: 0.3; font-style: italic; margin-top: 6px; color: #fff; }

/* Mobile view toggle (hidden on desktop) */
.mobile-toggle { display: none; }

@media (max-width: 900px) {
  body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  .sidebar-col, .templates-bar { width: 100% !important; min-width: unset !important; }
  .preview-pane { padding: 80px 12px 20px; }
  .sidebar { padding: 16px 14px 40px; }
  #schedule-card { width: 100% !important; max-width: 380px; height: auto !important; aspect-ratio: 9/16; }
  .theme-grid { grid-template-columns: repeat(2, 1fr); }
  input[type=time] { width: 100%; }
  .templates-bar { padding-top: 64px !important; }

  /* Slide toggle at the top */
  .mobile-toggle {
    display: flex;
    position: fixed;
    top: calc(env(safe-area-inset-top) + 10px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: rgba(18, 8, 24, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid var(--sidebar-border);
    border-radius: 999px;
    padding: 4px;
    gap: 2px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  .mobile-toggle button {
    background: none; border: none; color: #888;
    padding: 9px 22px; border-radius: 999px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: 'Poppins', Arial, sans-serif;
    transition: all 0.15s;
  }
  .mobile-toggle button.active {
    background: linear-gradient(135deg, var(--accent), #a00060);
    color: #fff;
    box-shadow: 0 2px 10px rgba(255,105,180,0.5);
  }

  /* View state — only one visible at a time on mobile */
  body.view-preview .sidebar-col { display: none !important; }
  body.view-edit .preview-pane { display: none !important; }
}

<body class="view-edit">

<!-- Mobile slide toggle -->
<div class="mobile-toggle">
  <button id="tog-edit"    class="active" onclick="setView('edit')">✏️ Edit</button>
  <button id="tog-preview"              onclick="setView('preview')">👁 Preview</button>
</div>

<div style="display:flex;flex-direction:column;height:100vh;overflow:hidden">
  <!-- Templates bar sits above sidebar -->
  <div style="display:flex;flex:1;overflow:hidden">

    <!-- Left column: templates bar + sidebar -->
    <div class="sidebar-col" style="display:flex;flex-direction:column;width:400px;min-width:360px;">
      <div class="templates-bar" id="templates-bar">
        <span class="templates-bar-label">My Schedules</span>
        <div id="template-chips"></div>
        <button class="btn-new-template" onclick="newTemplate()">+ New</button>
      </div>
      <div class="sidebar" style="flex:1;overflow-y:auto">

        <!-- ── Brand ── -->
        <div class="section-title">🎯 Live Name</div>
        <label class="fl">Live / Show Name</label>
        <input type="text" id="brandName" placeholder="e.g. Laced Up Women's, Sneaker Vault..." oninput="renderCard()" />
        <label class="fl">Week dates</label>
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:10px;">
          <input type="date" id="startDate" onchange="updateDateRange()" style="flex:1;margin-bottom:0;padding:7px 8px;font-size:12px;"/>
          <span style="color:#a080b0;font-size:12px;">→</span>
          <input type="date" id="endDate" onchange="updateDateRange()" style="flex:1;margin-bottom:0;padding:7px 8px;font-size:12px;"/>
        </div>
        <input type="hidden" id="dateRange" />

        <!-- ── Logo ── -->
        <div class="section-title">🖼 Logo</div>
        <div class="logo-upload-area" id="logo-drop">
          <input type="file" accept="image/*" onchange="handleLogo(event)" />
          <span class="placeholder" id="logo-placeholder">Click or drag your logo here</span>
          <img id="logo-preview" class="logo-preview" style="display:none" />
        </div>
        <button class="btn-clear-logo" onclick="clearLogo()" id="btn-clear-logo" style="display:none">✕ Remove logo</button>

        <!-- ── Theme ── -->
        <div class="section-title">🎨 Vibe / Theme</div>
        <div class="theme-grid" id="theme-grid"></div>

        <!-- ── Font ── -->
        <div class="section-title">✍️ Font Style</div>
        <div class="font-grid" id="font-grid"></div>

        <!-- ── Hosts roster ── -->
        <div class="section-title">👥 Hosts Roster</div>
        <div id="hosts-roster"></div>
        <div style="display:flex;gap:6px;margin-bottom:10px;">
          <input type="text" id="newHostInput" placeholder="Add host name..." onkeydown="if(event.key==='Enter'){addHostToRoster();event.preventDefault();}" style="flex:1;margin-bottom:0;"/>
          <button class="btn-add-stream" style="width:auto;padding:6px 14px;" onclick="addHostToRoster()">+ Add</button>
        </div>

        <!-- ── Days ── -->
        <div class="section-title">📅 Days &amp; Streams</div>
        <div id="days-container"></div>

        <button class="btn-save" onclick="saveTemplate()">💾 Save Template</button>
        <button class="btn-download" onclick="downloadCard()">⬇ Export as Image</button>
        <div style="height:20px"></div>
      </div>
    </div>

    <!-- Preview -->
    <div class="preview-pane">
      <div class="preview-label">✨ Live Preview</div>
      <div id="schedule-card"></div>
    </div>

  </div>
</div>

    cardShadow: '0 0 60px rgba(255,255,255,0.08)',
    cardBorder: '1px solid rgba(255,255,255,0.1)',
    glowBefore: 'radial-gradient(circle,rgba(255,255,255,0.08) 0%,rgba(150,150,150,0.05) 50%,transparent 70%)',
    glowAfter: 'radial-gradient(circle,rgba(100,100,100,0.08) 0%,transparent 70%)',
    dayCard: 'linear-gradient(145deg,#2a2a2a,#181818)',
    dayCardEmpty: 'linear-gradient(145deg,#111,#0a0a0a)',
    dayCardBorder: 'rgba(255,255,255,0.1)',
    dayCardShadow: '0 4px 14px rgba(0,0,0,0.8)',
    logoBadgeBg: 'linear-gradient(135deg,#444,#222)',
    logoBadgeShadow: '0 2px 12px rgba(0,0,0,0.6)',
    logoBadgeTextColor: '#aaa',
    subtitleColor: '#aaa',
    deco: '⭐🌙⭐',
    accent: '#ffffff',
    snameColor: '#ccc',
    stimeColor: '#aaa',
  },
];

const FONTS = [
  { id: 'poppins',   label: 'Poppins',  family: "'Poppins', Arial, sans-serif",       preview: 'Bold' },
  { id: 'bebas',     label: 'Bebas',    family: "'Bebas Neue', Arial, sans-serif",     preview: 'BEBAS' },
  { id: 'playfair',  label: 'Playfair', family: "'Playfair Display', serif",           preview: 'Elegant' },
  { id: 'pacifico',  label: 'Pacifico', family: "'Pacifico', cursive",                 preview: 'Pacifico' },
];

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let logoDataUrl = null;

// Three fixed time slots
const SLOTS = [
  { label: '9:30AM – 12:30PM' },
  { label: '1:30PM – 4:30PM'  },
  { label: '5PM – 8PM'        },
];

function defaultDays() {
  const mkSlots = (enabled) => SLOTS.map((s, i) => ({ enabled: enabled[i] || false, hosts: [] }));
  return [
    { enabled: true,  slots: mkSlots([false, true,  true ]) },
    { enabled: true,  slots: mkSlots([true,  true,  true ]) },
    { enabled: true,  slots: mkSlots([true,  true,  true ]) },
    { enabled: true,  slots: mkSlots([true,  true,  true ]) },
    { enabled: true,  slots: mkSlots([true,  true,  true ]) },
    { enabled: true,  slots: mkSlots([true,  true,  false]) },
    { enabled: false, slots: mkSlots([false, false, false]) },
  ];
}

// Migrate old formats to current {slots, hosts[]} shape
function migrateDay(day) {
  if (day.slots && day.slots[0] && Array.isArray(day.slots[0].hosts)) return day;
  if (day.slots) {
    return {
      enabled: day.enabled,
      slots: day.slots.map(s => ({
        enabled: s.enabled,
        hosts: s.name ? [s.name] : [],
      })),
    };
  }
  return { enabled: day.enabled, slots: SLOTS.map(() => ({ enabled: false, hosts: [] })) };
}

function defaultState(name = '') {
  return { brandName: name, dateRange: '', themeId: 'pink', fontId: 'poppins', logo: null, hostList: [], days: defaultDays() };
}

// Load templates from localStorage
function loadTemplates() {
  try { return JSON.parse(localStorage.getItem('scheduleTemplates') || '[]'); } catch { return []; }
}
function saveTemplates(tpls) {
  localStorage.setItem('scheduleTemplates', JSON.stringify(tpls));
}

let templates = loadTemplates();
let activeIdx = templates.length > 0 ? 0 : -1;

// Current working state (loaded from active template or fresh)
let cur = activeIdx >= 0 ? JSON.parse(JSON.stringify(templates[activeIdx].state)) : defaultState();

// ──────────────────────────────────────────────
// TEMPLATE MANAGEMENT
// ──────────────────────────────────────────────
function newTemplate() {
  const name = prompt('Name this live (e.g. "Laced Up Women\'s", "Sneaker Vault"):');
  if (!name) return;
  const tpl = { name, state: defaultState(name) };
  templates.push(tpl);
  saveTemplates(templates);
  activeIdx = templates.length - 1;
  cur = JSON.parse(JSON.stringify(tpl.state));
  logoDataUrl = cur.logo || null;
  syncToUI();
  renderTemplateChips();
}

function loadTemplate(idx) {
  activeIdx = idx;
  cur = JSON.parse(JSON.stringify(templates[idx].state));
  logoDataUrl = cur.logo || null;
  syncToUI();
  renderTemplateChips();
}

function deleteTemplate(idx) {
  if (!confirm(`Delete "${templates[idx].name}"?`)) return;
  templates.splice(idx, 1);
  saveTemplates(templates);
  if (activeIdx >= templates.length) activeIdx = templates.length - 1;
  if (templates.length > 0 && activeIdx >= 0) {
    cur = JSON.parse(JSON.stringify(templates[activeIdx].state));
    logoDataUrl = cur.logo || null;
    syncToUI();
  } else {
    activeIdx = -1;
    cur = defaultState();
    logoDataUrl = null;
    syncToUI();
  }
  renderTemplateChips();
}

function saveTemplate() {
  // Snapshot logo into state
  cur.logo = logoDataUrl;
  cur.brandName = document.getElementById('brandName').value;
  cur.dateRange = document.getElementById('dateRange').value;

  if (activeIdx >= 0) {
    templates[activeIdx].state = JSON.parse(JSON.stringify(cur));
    saveTemplates(templates);
    flashSaved();
  } else {
    const name = prompt('Name this live schedule:');
    if (!name) return;
    templates.push({ name, state: JSON.parse(JSON.stringify(cur)) });
    saveTemplates(templates);
    activeIdx = templates.length - 1;
    renderTemplateChips();
    flashSaved();
  }
}

function flashSaved() {
  const btn = document.querySelector('.btn-save');
  const orig = btn.textContent;
  btn.textContent = '✅ Saved!';
  setTimeout(() => { btn.textContent = orig; }, 1500);
}

function renderTemplateChips() {
  const container = document.getElementById('template-chips');
  container.innerHTML = '';
  templates.forEach((tpl, i) => {
    const chip = document.createElement('div');
    chip.className = 'template-chip' + (i === activeIdx ? ' active' : '');
    chip.innerHTML = `<span onclick="loadTemplate(${i})">${tpl.name}</span><span class="del" onclick="deleteTemplate(${i})">✕</span>`;
    container.appendChild(chip);
  });
}

// ──────────────────────────────────────────────
// SYNC UI ↔ STATE
// ──────────────────────────────────────────────
function formatDateRange(startISO, endISO) {
  if (!startISO || !endISO) return '';
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const s = new Date(startISO + 'T00:00:00');
  const e = new Date(endISO + 'T00:00:00');
  const sM = MONTHS[s.getMonth()], eM = MONTHS[e.getMonth()];
  const sY = s.getFullYear(), eY = e.getFullYear();
  if (sY !== eY) return `${sM} ${s.getDate()}, ${sY} – ${eM} ${e.getDate()}, ${eY}`;
  if (sM === eM) return `${sM} ${s.getDate()}–${e.getDate()}`;
  return `${sM} ${s.getDate()} – ${eM} ${e.getDate()}`;
}

function updateDateRange() {
  const s = document.getElementById('startDate').value;
  const e = document.getElementById('endDate').value;
  cur.startDate = s;
  cur.endDate = e;
  const formatted = formatDateRange(s, e);
  document.getElementById('dateRange').value = formatted;
  cur.dateRange = formatted;
  renderCard();
}

function syncToUI() {
  document.getElementById('brandName').value = cur.brandName || '';
  document.getElementById('startDate').value = cur.startDate || '';
  document.getElementById('endDate').value = cur.endDate || '';
  document.getElementById('dateRange').value = cur.dateRange || formatDateRange(cur.startDate, cur.endDate) || '';
  // logo
  if (logoDataUrl) {
    document.getElementById('logo-preview').src = logoDataUrl;
    document.getElementById('logo-preview').style.display = '';
    document.getElementById('logo-placeholder').style.display = 'none';
    document.getElementById('btn-clear-logo').style.display = '';
  } else {
    document.getElementById('logo-preview').style.display = 'none';
    document.getElementById('logo-placeholder').style.display = '';
    document.getElementById('btn-clear-logo').style.display = 'none';
  }
  if (!cur.hostList) cur.hostList = [];
  buildThemeGrid();
  buildFontGrid();
  buildRoster();
  buildSidebar();
  renderCard();
}

// ──────────────────────────────────────────────
// LOGO
// ──────────────────────────────────────────────
function handleLogo(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    logoDataUrl = ev.target.result;
    document.getElementById('logo-preview').src = logoDataUrl;
    document.getElementById('logo-preview').style.display = '';
    document.getElementById('logo-placeholder').style.display = 'none';
    document.getElementById('btn-clear-logo').style.display = '';
    renderCard();
  };
  reader.readAsDataURL(file);
}
function clearLogo() {
  logoDataUrl = null;
  document.getElementById('logo-preview').style.display = 'none';
  document.getElementById('logo-placeholder').style.display = '';
  document.getElementById('btn-clear-logo').style.display = 'none';
  renderCard();
}

// ──────────────────────────────────────────────
// THEME
// ──────────────────────────────────────────────
function buildThemeGrid() {
  const grid = document.getElementById('theme-grid');
  grid.innerHTML = '';
  THEMES.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'theme-btn' + (cur.themeId === t.id ? ' selected' : '');
    btn.style.cssText = t.btnStyle;
    btn.textContent = t.label;
    btn.onclick = () => { cur.themeId = t.id; buildThemeGrid(); renderCard(); };
    grid.appendChild(btn);
  });
}

// ──────────────────────────────────────────────
// FONT
// ──────────────────────────────────────────────
function buildFontGrid() {
  const grid = document.getElementById('font-grid');
  grid.innerHTML = '';
  FONTS.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'font-btn' + (cur.fontId === f.id ? ' selected' : '');
    btn.style.fontFamily = f.family;
    btn.textContent = f.preview;
    btn.onclick = () => { cur.fontId = f.id; buildFontGrid(); renderCard(); };
    grid.appendChild(btn);
  });
}

// ──────────────────────────────────────────────
// DAYS SIDEBAR
// ──────────────────────────────────────────────
function buildSidebar() {
  const container = document.getElementById('days-container');
  container.innerHTML = '';
  cur.days.forEach((day, di) => {
    day = migrateDay(day);
    cur.days[di] = day;
    const block = document.createElement('div');
    block.className = 'day-block';
    block.innerHTML = `
      <div class="day-header">
        <input type="checkbox" ${day.enabled ? 'checked' : ''} onchange="toggleDay(${di},this.checked)"/>
        <span class="${day.enabled ? 'on' : 'off'}">${DAYS[di]}</span>
      </div>
      <div style="${day.enabled ? '' : 'opacity:0.3;pointer-events:none'}">
        ${day.slots.map((s,si) => slotRowHTML(di,si,s)).join('')}
      </div>`;
    container.appendChild(block);
  });
}

function slotRowHTML(di, si, s) {
  const selectedHosts = (s.hosts || []).filter(h => h && h.trim());
  const roster = cur.hostList || [];
  // Chips for selected hosts
  const chipsHTML = selectedHosts.map((h, hi) => `
    <span style="display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,var(--accent),#a00060);color:#fff;font-size:11px;font-weight:600;padding:3px 4px 3px 9px;border-radius:999px;margin:0 4px 4px 0;">
      ${h.replace(/</g,'&lt;')}
      <button onclick="rmHost(${di},${si},${hi})" style="background:rgba(0,0,0,0.3);border:none;color:#fff;cursor:pointer;width:16px;height:16px;border-radius:50%;font-size:10px;padding:0;line-height:1;display:inline-flex;align-items:center;justify-content:center;">✕</button>
    </span>`).join('');

  // Dropdown options (exclude already-selected)
  const available = roster.filter(h => !selectedHosts.includes(h));
  const dropdownHTML = available.length > 0
    ? `<select onchange="addHostToSlot(${di},${si},this.value);this.value='';" style="font-size:12px;padding:5px 7px;background:var(--input-bg);border:1px solid var(--input-border);color:#fff;border-radius:6px;font-family:'Poppins',Arial,sans-serif;cursor:pointer;">
         <option value="">+ Add host...</option>
         ${available.map(h => `<option value="${h.replace(/"/g,'&quot;')}">${h.replace(/</g,'&lt;')}</option>`).join('')}
       </select>`
    : `<span style="font-size:10px;color:#7a5a8a;font-style:italic;">${roster.length === 0 ? 'Add hosts to your roster above ↑' : 'All hosts added'}</span>`;

  return `<div style="background:#160920;border:1px solid #2d1438;border-radius:8px;padding:8px;margin-bottom:7px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <input type="checkbox" ${s.enabled ? 'checked' : ''} onchange="toggleSlot(${di},${si},this.checked)" style="width:15px;height:15px;accent-color:var(--accent);margin:0;"/>
      <span style="font-size:11px;color:#c090d0;font-weight:700;letter-spacing:0.3px;">${SLOTS[si].label}</span>
    </div>
    <div style="${s.enabled ? '' : 'opacity:0.35;pointer-events:none'};padding-left:22px;">
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:0;">${chipsHTML}${dropdownHTML}</div>
    </div>
  </div>`;
}

function toggleDay(di, val) { cur.days[di].enabled = val; buildSidebar(); renderCard(); }
function toggleSlot(di, si, val) { cur.days[di].slots[si].enabled = val; buildSidebar(); renderCard(); }
function addHostToSlot(di, si, name) {
  if (!name) return;
  if (!cur.days[di].slots[si].hosts) cur.days[di].slots[si].hosts = [];
  cur.days[di].slots[si].hosts.push(name);
  buildSidebar();
  renderCard();
}
function rmHost(di, si, hi) { cur.days[di].slots[si].hosts.splice(hi, 1); buildSidebar(); renderCard(); }

// ── Host roster management ──
function buildRoster() {
  const container = document.getElementById('hosts-roster');
  if (!container) return;
  const list = cur.hostList || [];
  if (list.length === 0) {
    container.innerHTML = `<div style="font-size:11px;color:#7a5a8a;font-style:italic;margin-bottom:8px;padding-left:2px;">No hosts yet. Add them below ↓</div>`;
    return;
  }
  container.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;">
    ${list.map((h, i) => `
      <span style="display:inline-flex;align-items:center;gap:5px;background:var(--input-bg);border:1px solid var(--input-border);color:#fff;font-size:12px;padding:4px 5px 4px 10px;border-radius:999px;">
        ${h.replace(/</g,'&lt;')}
        <button onclick="rmHostFromRoster(${i})" title="Remove" style="background:none;border:none;color:#9060a0;cursor:pointer;font-size:11px;padding:0 3px;">✕</button>
      </span>`).join('')}
  </div>`;
}

function addHostToRoster() {
  const input = document.getElementById('newHostInput');
  const name = (input.value || '').trim();
  if (!name) return;
  if (!cur.hostList) cur.hostList = [];
  if (cur.hostList.includes(name)) { input.value = ''; return; }
  cur.hostList.push(name);
  input.value = '';
  buildRoster();
  buildSidebar();
}

function rmHostFromRoster(i) {
  const name = cur.hostList[i];
  if (!confirm(`Remove "${name}" from the roster? This will also remove them from any slots they're assigned to.`)) return;
  cur.hostList.splice(i, 1);
  // Remove from all slots
  cur.days.forEach(day => {
    (day.slots || []).forEach(slot => {
      if (slot.hosts) slot.hosts = slot.hosts.filter(h => h !== name);
    });
  });
  buildRoster();
  buildSidebar();
  renderCard();
}

// ──────────────────────────────────────────────
// CARD RENDER
// ──────────────────────────────────────────────
function fmt(t) {
  if (!t) return '';
  const [h,m] = t.split(':').map(Number);
  const ap = h < 12 ? 'AM' : 'PM';
  const hh = h % 12 || 12;
  return m === 0 ? `${hh}${ap}` : `${hh}:${String(m).padStart(2,'0')}${ap}`;
}

function renderCard() {
  const brand   = document.getElementById('brandName')?.value || '';
  const date    = document.getElementById('dateRange')?.value || '';
  const theme   = THEMES.find(t => t.id === cur.themeId) || THEMES[0];
  const font    = FONTS.find(f => f.id === cur.fontId) || FONTS[0];
  const topDays = cur.days.slice(0, 3);
  const botDays = cur.days.slice(3);

  function dayCardHTML(day, label) {
    day = migrateDay(day);
    const activeSlots = day.slots.filter(s => s.enabled);
    if (!day.enabled || activeSlots.length === 0) return `<div class="day-card" style="background:${theme.dayCardEmpty};border:1px solid ${theme.dayCardBorder};box-shadow:none;">
      <div class="dc-day">${label}</div><div class="dc-off">No stream</div></div>`;
    let inner = `<div class="dc-day">${label}</div>`;
    day.slots.forEach((s, si) => {
      if (!s.enabled) return;
      const hosts = (s.hosts || []).filter(h => h && h.trim());
      const hostLine = hosts.length ? hosts.join(' & ') : '—';
      inner += `<div class="dc-main">${hostLine}</div><div class="dc-mtime" style="color:${theme.snameColor}">${SLOTS[si].label}</div>`;
    });
    return `<div class="day-card" style="background:${theme.dayCard};border:1px solid ${theme.dayCardBorder};box-shadow:${theme.dayCardShadow};">${inner}</div>`;
  }

  // Logo section
  let logoHTML = '';
  if (logoDataUrl) {
    logoHTML = `<img src="${logoDataUrl}" class="card-logo" style="max-height:52px;max-width:130px;object-fit:contain;"/>`;
  } else if (brand) {
    const parts = brand.split(' ');
    const top = parts.slice(0,-1).join(' ') || brand;
    const bot = parts.slice(-1)[0] || '';
    logoHTML = `<div class="card-logo-badge" style="background:${theme.logoBadgeBg};box-shadow:${theme.logoBadgeShadow};">
      <span class="lb-top">${top}</span>
      <span class="lb-mid" style="font-family:${font.family}">${bot}</span>
      <span class="lb-bot" style="color:${theme.logoBadgeTextColor}">LIVE</span>
    </div>`;
  }

  const decoItems = theme.deco.match(/./gu) || [];
  const decoHTML = decoItems.map(d => `<span class="card-deco-item">${d}</span>`).join('');

  const card = document.getElementById('schedule-card');
  card.style.background = theme.cardBg;
  card.style.boxShadow  = theme.cardShadow;
  card.style.border     = theme.cardBorder;
  card.style.fontFamily = font.family;

  card.innerHTML = `
    <div style="position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:${theme.glowBefore};border-radius:50%;z-index:0;pointer-events:none;"></div>
    <div style="position:absolute;bottom:-30px;left:-30px;width:140px;height:140px;background:${theme.glowAfter};border-radius:50%;z-index:0;pointer-events:none;"></div>

    <div class="card-top">
      ${logoHTML}
      <div class="card-accent-deco">${decoHTML}</div>
    </div>

    ${brand ? `<div class="card-brand" style="color:${theme.accent};font-family:${font.family}">${brand.toUpperCase()}</div>` : ''}
    <div class="card-title" style="font-family:${font.family};text-shadow:0 0 20px ${theme.accent}55">LIVESTREAM<br>SCHEDULE</div>
    <div class="card-subtitle-date" style="color:${theme.subtitleColor};font-family:${font.family}">${date}</div>

    <div class="days-grid">${topDays.map((d,i) => dayCardHTML(d, DAYS[i])).join('')}</div>
    <div class="days-grid-bottom">${botDays.map((d,i) => dayCardHTML(d, DAYS[3+i])).join('')}</div>
  `;
}

// ──────────────────────────────────────────────
// EXPORT
// ──────────────────────────────────────────────
async function downloadCard() {
  const card = document.getElementById('schedule-card');
  // Card is 405×720 → scale ×2.667 = 1080×1920 (iPhone Story perfect)
  const canvas = await html2canvas(card, {
    scale: 1080 / card.offsetWidth,
    useCORS: true,
    allowTaint: true,
    width: card.offsetWidth,
    height: card.offsetHeight,
    windowWidth: card.offsetWidth,
    windowHeight: card.offsetHeight,
  });
  const link = document.createElement('a');
  const safeName = (document.getElementById('brandName').value || 'schedule').replace(/[^a-z0-9]/gi,'_');
  link.download = `${safeName}_iphone_story.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ──────────────────────────────────────────────
// MOBILE VIEW TOGGLE
// ──────────────────────────────────────────────
function setView(view) {
  document.body.classList.remove('view-edit', 'view-preview');
  document.body.classList.add('view-' + view);
  document.getElementById('tog-edit').classList.toggle('active', view === 'edit');
  document.getElementById('tog-preview').classList.toggle('active', view === 'preview');
  window.scrollTo(0, 0);
}

// ──────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────
renderTemplateChips();
syncToUI();
</script>
</body>
